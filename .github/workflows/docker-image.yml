name: Publish Docker Image

on:
  push:
    branches:
      - "**"
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      release:
        description: "Release tag set to publish"
        required: true
        default: "12.1"
        type: choice
        options:
          - "12.1"
          - "12.0.4"
  # pull_request:
  #   branches:
  #     - 'master'

jobs:
  push_to_registries:
    name: Push Docker image to multiple registries
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - name: Check out the repo
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.release == '12.0.4') }}
        uses: actions/checkout@v6

      - name: Check out the v12.0.4 source
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release == '12.0.4' }}
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ba024c4f23aaad0076b50fce6057cc3815263115

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: |
            blacktop/ghidra
            ghcr.io/${{ github.repository }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Docker Login
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # - name: Build and push Docker image (v9)
      #   id: docker_build_9
      #   uses: docker/build-push-action@v7
      #   with:
      #     context: ./9
      #     push: ${{ github.event_name != 'pull_request' }}
      #     tags: |
      #       blacktop/ghidra:9
      #       blacktop/ghidra:9.2
      #       blacktop/ghidra:9.2.4
      #     platforms: linux/amd64 # No native binaries or binary build script included
      #     labels: ${{ steps.meta.outputs.labels }}

      # - name: Build and push Docker image (v10)
      #   id: docker_build_10
      #   uses: docker/build-push-action@v7
      #   with:
      #     context: ./10
      #     push: ${{ github.event_name != 'pull_request' }}
      #     tags: |
      #       blacktop/ghidra:10
      #       blacktop/ghidra:10.4
      #       blacktop/ghidra:10.4.0
      #       ghcr.io/blacktop/ghidra:10
      #       ghcr.io/blacktop/ghidra:10.4
      #       ghcr.io/blacktop/ghidra:10.4.0
      #     platforms: linux/amd64,linux/arm64
      #     labels: ${{ steps.meta.outputs.labels }}

      # - name: Build and push Docker image (v11)
      #   id: docker_build_11
      #   uses: docker/build-push-action@v7
      #   with:
      #     context: ./11
      #     push: ${{ github.event_name != 'pull_request' }}
      #     tags: |
      #       blacktop/ghidra:11
      #       blacktop/ghidra:11.4
      #       blacktop/ghidra:11.4.3
      #       blacktop/ghidra:latest
      #       ghcr.io/blacktop/ghidra:11
      #       ghcr.io/blacktop/ghidra:11.4
      #       ghcr.io/blacktop/ghidra:11.4.3
      #       ghcr.io/blacktop/ghidra:latest
      #     platforms: linux/amd64,linux/arm64
      #     labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image (v12.1)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.release == '12.0.4') }}
        id: docker_build_12
        uses: docker/build-push-action@v7
        with:
          context: ./12
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            blacktop/ghidra:12
            blacktop/ghidra:12.1
            blacktop/ghidra:12.1.0
            blacktop/ghidra:latest
            ghcr.io/blacktop/ghidra:12
            ghcr.io/blacktop/ghidra:12.1
            ghcr.io/blacktop/ghidra:12.1.0
            ghcr.io/blacktop/ghidra:latest
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}

      - name: Build and push Docker image (v12.1 alpine)
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.release == '12.0.4') }}
        id: docker_build_alpine
        uses: docker/build-push-action@v7
        with:
          context: ./alpine
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            blacktop/ghidra:12-alpine
            blacktop/ghidra:12.1-alpine
            blacktop/ghidra:12.1.0-alpine
            blacktop/ghidra:alpine
            ghcr.io/blacktop/ghidra:12-alpine
            ghcr.io/blacktop/ghidra:12.1-alpine
            ghcr.io/blacktop/ghidra:12.1.0-alpine
            ghcr.io/blacktop/ghidra:alpine
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}

      - name: Restore Docker image tags (v12.0.4)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release == '12.0.4' }}
        id: docker_restore_12_0_4
        uses: docker/build-push-action@v7
        with:
          context: ./12
          push: true
          tags: |
            blacktop/ghidra:12.0
            blacktop/ghidra:12.0.4
            ghcr.io/blacktop/ghidra:12.0
            ghcr.io/blacktop/ghidra:12.0.4
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}

      - name: Restore Docker image tags (v12.0.4 alpine)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.release == '12.0.4' }}
        id: docker_restore_alpine_12_0_4
        uses: docker/build-push-action@v7
        with:
          context: ./alpine
          push: true
          tags: |
            blacktop/ghidra:12.0-alpine
            blacktop/ghidra:12.0.4-alpine
            ghcr.io/blacktop/ghidra:12.0-alpine
            ghcr.io/blacktop/ghidra:12.0.4-alpine
          platforms: linux/amd64,linux/arm64
          labels: ${{ steps.meta.outputs.labels }}
